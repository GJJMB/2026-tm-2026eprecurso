<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stickman Runner</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
    }
    #game-container canvas {
      display: block;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    .overlay.hidden {
      display: none;
    }
    .hidden {
      display: none !important;
    }
    #main-menu {
      background: #111;
    }
    #pause-menu {
      background: rgba(0, 0, 0, 0.6);
    }

    .panel {
      position: relative;
      min-width: 280px;
      padding: 32px 40px;
      text-align: center;
      color: #fff;
      background: #1d1d2b;
      border: 1px solid #3a3a4a;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }
    .btn-close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #888;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
    }
    .btn-close:hover {
      background: #2c2c3a;
      color: #fff;
    }
    .panel h1 {
      margin: 0 0 24px;
      font-size: 32px;
    }
    .panel h2 {
      margin: 0 0 20px;
      font-size: 24px;
    }

    .btn {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #2c2c3a;
      color: #ddd;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .btn:hover {
      background: #3a3a4e;
    }
    .btn.primary {
      background: #4a6cf7;
      color: #fff;
    }
    .btn.primary:hover {
      background: #5c7bff;
    }

    #go-title.win {
      color: #7CFC00;
    }
    #go-title.lose {
      color: #ff5555;
    }
    .reason {
      margin: -16px 0 20px;
      font-size: 14px;
      color: #bbb;
    }
    .score {
      margin: 0 0 8px;
      font-size: 16px;
      color: #ddd;
    }
    .medal {
      margin: 0 0 16px;
      font-size: 18px;
      font-weight: bold;
    }
    .medal.medal-gold {
      color: #ffd700;
    }
    .medal.medal-silver {
      color: #c0c0c0;
    }
    .medal.medal-bronze {
      color: #cd7f32;
    }
    .hint {
      margin: 4px 0 0;
      font-size: 13px;
      color: #888;
    }

    .lang-row {
      margin-top: 20px;
    }
    .lang-row span {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #888;
    }
    .lang-buttons {
      display: flex;
      justify-content: center;
      gap: 8px;
    }
    .lang-btn {
      padding: 6px 14px;
      font-size: 13px;
      border: none;
      border-radius: 6px;
      background: #242430;
      color: #777;
      cursor: pointer;
    }
    .lang-btn.active {
      color: #fff;
      background: #333344;
    }

    .campaign-row {
      margin-top: 20px;
    }
    .campaign-row span {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #888;
    }
    .campaign-buttons {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .campaign-btn {
      padding: 8px 14px;
      font-size: 13px;
      border: none;
      border-radius: 6px;
      background: #242430;
      color: #ccc;
      cursor: pointer;
      text-align: left;
    }
    .campaign-btn.active {
      color: #fff;
      background: #333344;
      box-shadow: inset 0 0 0 1px #4a6cf7;
    }

    .editor-link {
      display: inline-block;
      margin-top: 20px;
      font-size: 13px;
      color: #888;
      text-decoration: none;
    }
    .editor-link:hover {
      color: #ccc;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <div id="main-menu" class="overlay hidden">
    <div class="panel">
      <h1 id="mm-title"></h1>
      <button id="mm-start" class="btn primary"></button>
      <div class="campaign-row" id="mm-campaign-row">
        <span id="mm-campaign-label"></span>
        <div id="mm-campaign-buttons" class="campaign-buttons"></div>
        <p class="hint hidden" id="mm-campaign-empty"></p>
      </div>
      <div class="lang-row">
        <span id="mm-lang-label"></span>
        <div id="mm-lang-buttons" class="lang-buttons"></div>
      </div>
      <a id="mm-editor-link" class="editor-link" href="editor.html" target="_blank" rel="noopener"></a>
    </div>
  </div>

  <div id="pause-menu" class="overlay hidden">
    <div class="panel">
      <button id="pm-close" class="btn-close" aria-label="Resume">&times;</button>
      <h2 id="pm-title"></h2>
      <button id="pm-restart" class="btn primary"></button>
      <button id="pm-leave" class="btn"></button>
    </div>
  </div>

  <div id="game-over-menu" class="overlay hidden">
    <div class="panel">
      <h2 id="go-title"></h2>
      <p id="go-reason" class="reason hidden"></p>
      <p id="go-score" class="score hidden"></p>
      <p id="go-medal" class="medal hidden"></p>
      <button id="go-next" class="btn hidden"></button>
      <button id="go-restart" class="btn"></button>
      <button id="go-leave" class="btn hidden"></button>
      <p id="go-hint" class="hint"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
